name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "Swarm Agent/backend"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: "Swarm Agent/backend/requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-asyncio httpx

      - name: Lint (syntax + undefined names only)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=.pytest_cache,__pycache__

      - name: Run tests
        env:
          DEMO_MODE: "true"
          JWT_SECRET: "ci-test-secret-key-at-least-32-bytes-long-xxxxxx"
        run: pytest tests/ -v --tb=short

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "Swarm Agent/frontend"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: "Swarm Agent/frontend/package-lock.json"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build
